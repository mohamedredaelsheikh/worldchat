plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.worldchat.community"
    compileSdkVersion 36
    ndkVersion "28.2.13676358"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
    lintOptions {
        disable 'InvalidPackage'
        disable "Instantiatable"
        checkReleaseBuilds false
        abortOnError false
    }
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.worldchat.community"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        versionCode 111
        versionName '1.0.111'

    }
    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.release
        }
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release

            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // This app uses Agora for voice only (no video APIs are called). Agora bundles
    // ~28 MB/ABI of video-only extension libraries that can never be used here, so
    // we strip them from the package. Extensions are optional at runtime, so their
    // absence only removes unused video features. All AUDIO libraries are kept.
    packaging {
        jniLibs {
            excludes += [
                // Real Android phones are ARM only. x86/x86_64 are used solely by
                // emulators. armeabi-v7a is legacy 32-bit; this app targets 64-bit
                // arm64-v8a only. (ndk.abiFilters is ignored for App Bundles, so we
                // strip the unwanted ABIs here.)
                '**/x86/**',
                '**/x86_64/**',
                '**/armeabi-v7a/**',
                '**/libagora_clear_vision_extension.so',
                '**/libagora_lip_sync_extension.so',
                '**/libagora_segmentation_extension.so',
                '**/libagora_face_capture_extension.so',
                '**/libagora_face_detection_extension.so',
                '**/libagora_content_inspect_extension.so',
                '**/libagora_video_av1_encoder_extension.so',
                '**/libagora_video_quality_analyzer_extension.so',
                '**/libagora_video_encoder_extension.so',
                '**/libagora_screen_capture_extension.so',
            ]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.4.0'
    implementation 'com.facebook.android:facebook-android-sdk:latest.release'
    implementation platform('com.google.firebase:firebase-bom:31.4.0')
    implementation "androidx.browser:browser:1.3.0"
    implementation 'com.google.firebase:firebase-auth'

    implementation("com.android.billingclient:billing:4.0.0")
}
