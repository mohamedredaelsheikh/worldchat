dependency_overrides:
  # svgaplayer_flutter declares http ^0.13 but its code (get(Uri.parse(url)),
  # .bodyBytes) is compatible with http 1.x. Overriding http lets the rest of
  # the graph (lottie 3.x, image_cropper 8.x, cached_network_image 3.4.x, ...)
  # use modern, Dart-3-compatible versions instead of being anchored to 0.13.
  http: ^1.2.0
  # archive <3.5 uses UnmodifiableUint8ListView etc. which were removed in Dart 3.
  # 3.6.1 is Dart-3-safe and satisfies all consumers (svgaplayer needs ^3.1.2).
  archive: ^3.6.1
  # 2.0.7 still references the removed v1 embedding (PluginRegistry.Registrar).
  flutter_plugin_android_lifecycle: ^2.0.17
  # These abandoned plugins reference the removed v1 embedding (and old removed
  # APIs). Vendored under third_party/ with the dead v1 code stripped out.
  flutter_sim_country_code:
    path: third_party/flutter_sim_country_code
  country_list_pick:
    path: third_party/country_list_pick
  pusher_client:
    path: third_party/pusher_client
  image_downloader:
    path: third_party/image_downloader

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
